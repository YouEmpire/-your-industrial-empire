<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Industrial Empire: Real Graphics</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00d2ff; --gold: #ffcc00; --bg: #050507; --ui: rgba(15, 15, 18, 0.95); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        
        .top-bar { background: var(--ui); padding: 15px; border-bottom: 2px solid var(--blue); display: flex; justify-content: space-between; align-items: center; backdrop-filter: blur(10px); z-index: 100; position: relative; }
        .stat-value { font-size: 26px; font-weight: 900; color: var(--gold); text-shadow: 0 0 10px var(--gold); }

        #game-canvas { width: 100%; height: 55vh; position: relative; overflow: hidden; display: flex; align-items: center; justify-content: center; background: radial-gradient(circle, #1a1a1e, #050507); }
        
        .building-container { position: relative; width: 320px; height: 320px; transform: rotateX(55deg) rotateZ(-45deg); transform-style: preserve-3d; transition: 0.3s; z-index: 10; }
        .building-sprite { width: 100%; height: 100%; object-fit: contain; transform: rotateZ(45deg) rotateX(-55deg); filter: drop-shadow(0 20px 40px rgba(0,0,0,0.9)); transition: 0.2s; }
        
        .control-panel { height: 35vh; background: #08080a; border-top: 1px solid #222; padding: 15px; box-sizing: border-box; display: flex; flex-direction: column; justify-content: space-between; }
        .btn-main { background: linear-gradient(135deg, #00d2ff, #0066ff); border: none; color: white; width: 100%; padding: 22px; border-radius: 20px; font-size: 24px; font-weight: 900; box-shadow: 0 6px #0044aa; text-transform: uppercase; cursor: pointer; }
        .btn-main:active { transform: translateY(4px); box-shadow: 0 2px #0044aa; }

        .overlay { position: fixed; inset: 0; background: var(--bg); z-index: 1000; display: flex; flex-direction: column; align-items: center; justify-content: center; padding: 10px; }
        .choice-btn { background: #121214; width: 90%; padding: 20px; margin: 8px; border-radius: 15px; border: 1px solid #333; display: flex; align-items: center; gap: 15px; cursor: pointer; }
    </style>
</head>
<body>
    <div id="setup" class="overlay">
        <h2 style="letter-spacing: 2px; margin-bottom: 20px;">ГЕНЕРАЛЬНЫЙ ШТАБ</h2>
        <div class="choice-btn" onclick="init('auto')">⚙️ <div><b>ТЕХЦЕНТР</b><br><small>Тюнинг и ремонт</small></div></div>
        <div class="choice-btn" onclick="init('farm')">🚜 <div><b>АГРОКОМПЛЕКС</b><br><small>Пищевая индустрия</small></div></div>
        <div class="choice-btn" onclick="init('mine')">⛏️ <div><b>ДОБЫЧА</b><br><small>Ресурсы и минералы</small></div></div>
        <div class="choice-btn" onclick="init('trans')">🚛 <div><b>ЛОГИСТИКА</b><br><small>Глобальные перевозки</small></div></div>
    </div>

    <div id="game" style="display:none">
        <div class="top-bar">
            <div><div style="font-size:10px; color:var(--blue)">БАЛАНС</div><div class="stat-value" id="money">100</div></div>
            <div style="text-align:right;"><div style="font-size:10px; color:#0f0">ДОХОД</div><div style="color:#0f0; font-weight:bold;">+<span id="income">0</span>/сек</div></div>
        </div>

        <div id="game-canvas">
            <div class="building-container" id="building-box">
                <img id="sprite" class="building-sprite" src="" alt="Empire Object">
            </div>
        </div>

        <div class="control-panel">
            <button class="btn-main" onclick="work()">ПРОИЗВОДСТВО</button>
            <div style="display: flex; justify-content: space-between; font-size: 13px; color: #888;">
                <span>Уровень: <b id="lvl" style="color:white">1</b></span>
                <span onclick="upgrade()" style="color:var(--blue); font-weight:bold; text-transform:uppercase;">Улучшить (500 🪙)</span>
            </div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let balance = 100, passive = 0, level = 1, currentType = '';

        function init(type) {
            currentType = type;
            document.getElementById('setup').style.display = 'none';
            document.getElementById('game').style.display = 'block';
            
            const sprites = {
                auto: 'https://i.ibb.co/VvW3XW2/file-624212.jpg',
                farm: 'https://i.ibb.co/KzsXjD1/file-624215.jpg',
                mine: 'https://i.ibb.co/jvkH3R4/file-624217.jpg',
                trans: 'https://i.ibb.co/L5wZ6Qx/file-624228.jpg'
            };
            document.getElementById('sprite').src = sprites[type];
            
            // ОТПРАВКА ДАННЫХ БОТУ
            tg.sendData(JSON.stringify({
                action: "init_industry",
                industry: type
            }));
        }

        function work() {
            balance += 10 * level; updateUI();
            document.getElementById('building-box').style.transform = "rotateX(55deg) rotateZ(-45deg) scale(1.08)";
            setTimeout(() => { document.getElementById('building-box').style.transform = "rotateX(55deg) rotateZ(-45deg) scale(1)"; }, 100);
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function upgrade() {
            if(balance >= 500) {
                balance -= 500; level++; passive += 20;
                updateUI(); tg.HapticFeedback.notificationOccurred('success');
                // Отправка боту информации об улучшении
                tg.sendData(JSON.stringify({action: "upgrade", level: level, balance: balance}));
            } else { tg.showAlert("Мало средств!"); }
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(balance);
            document.getElementById('income').innerText = passive;
            document.getElementById('lvl').innerText = level;
        }

        setInterval(() => { if(passive > 0) { balance += passive/10; updateUI(); } }, 100);
    </script>
</body>
</html>
