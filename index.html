<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Industrial Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00d2ff; --gold: #ffcc00; --bg: #0a0a0b; --card: #161618; --green: #00ff00; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        
        .header { background: #111; padding: 20px; text-align: center; border-bottom: 2px solid var(--blue); box-shadow: 0 5px 25px rgba(0,210,255,0.3); }
        .balance { font-size: 38px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        .passive-info { font-size: 14px; color: var(--green); font-weight: bold; }

        .main-container { height: 75vh; overflow-y: auto; padding: 15px; }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ЭКРАН ВЫБОРА */
        .choice-card { background: var(--card); border-radius: 20px; padding: 20px; margin-bottom: 15px; border: 1px solid #333; text-align: center; transition: 0.3s; cursor: pointer; }
        .choice-card:active { border-color: var(--blue); transform: scale(0.98); }
        .choice-icon { font-size: 50px; margin-bottom: 10px; display: block; }

        /* ИЗОМЕТРИЧЕСКИЙ ЭФФЕКТ ДЛЯ ЗДАНИЙ */
        .building-container { perspective: 1000px; margin: 20px 0; }
        .building-card { 
            background: linear-gradient(135deg, #1e1e20, #161618); 
            border-radius: 20px; padding: 30px; 
            border: 1px solid #333; 
            transform: rotateX(10deg) rotateY(-5deg);
            box-shadow: 10px 10px 30px rgba(0,0,0,0.5);
            transition: transform 0.3s;
        }
        .working .building-card { animation: vibe 0.5s infinite alternate; }
        (at)keyframes vibe { from { transform: rotateX(10deg) rotateY(-5deg) translateY(0); } to { transform: rotateX(10deg) rotateY(-5deg) translateY(-5px); } }

        .building-visual { font-size: 90px; display: block; filter: drop-shadow(0 0 15px var(--blue)); }

        .btn-work { 
            background: linear-gradient(135deg, var(--blue), #0066ff); 
            border: none; color: white; width: 100%; padding: 22px; 
            border-radius: 18px; font-size: 24px; font-weight: 900; 
            cursor: pointer; box-shadow: 0 6px #0044aa; margin-top: 20px; 
            text-transform: uppercase; 
        }
        .btn-work:active { transform: translateY(4px); box-shadow: 0 2px #0044aa; }

        .upgrade-card { 
            background: var(--card); border-radius: 15px; padding: 15px; 
            margin-bottom: 10px; display: flex; justify-content: space-between; 
            align-items: center; border-left: 4px solid var(--blue); 
        }
        
        .navbar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 12px 0; border-top: 1px solid #333; }
        .nav-btn { color: #555; text-align: center; flex: 1; font-size: 11px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
    </style>
</head>
<body>
    <!-- ВЫБОР ОТРАСЛИ -->
    <div id="setup-screen" class="screen active" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--blue); letter-spacing: 1px;">ОСНОВАНИЕ ИМПЕРИИ</h2>
        <p style="color: #888; font-size: 14px; margin-bottom: 30px;">Выберите промышленный вектор развития</p>
        
        <div class="choice-card" onclick="startApp('Шиномонтаж', '⚙️')">
            <span class="choice-icon">⚙️</span>
            <b style="color: var(--blue);">ШИНОМОНТАЖ</b><br>
            <small style="color: #666;">Начните с малого сервиса в крупную сеть</small>
        </div>
        
        <div class="choice-card" onclick="startApp('Ферма', '🚜')">
            <span class="choice-icon">🚜</span>
            <b style="color: var(--blue);">ФЕРМА</b><br>
            <small style="color: #666;">Агропромышленный комплекс будущего</small>
        </div>
        
        <div class="choice-card" onclick="startApp('Шахта', '⛏️')">
            <span class="choice-icon">⛏️</span>
            <b style="color: var(--blue);">ШАХТА</b><br>
            <small style="color: #666;">Добыча редких ископаемых и металлов</small>
        </div>
    </div>

    <!-- ИГРОВОЙ ИНТЕРФЕЙС -->
    <div id="game-ui" style="display: none;">
        <div class="header">
            <div class="balance" id="balance">100</div>
            <div class="passive-info" id="p-income">+0 🪙/сек</div>
        </div>
        
        <div class="main-container">
            <!-- ВКЛАДКА: ЦЕХ -->
            <div id="tab-factory" class="screen active">
                <div class="building-container working">
                    <div class="building-card">
                        <div id="industry-title" style="color:var(--blue); font-weight:800; letter-spacing:2px; text-transform:uppercase; margin-bottom:10px;">ОТРАСЛЬ</div>
                        <span class="building-visual" id="main-visual">🏭</span>
                        <div style="font-size: 18px; margin-top:15px; color:#aaa;">Уровень: <span id="lvl" style="color:white; font-weight:bold;">1</span></div>
                    </div>
                </div>
                <button class="btn-work" onclick="work()">ПРОИЗВОДСТВО</button>
            </div>

            <!-- ВКЛАДКА: МАГАЗИН -->
            <div id="tab-shop" class="screen">
                <h3 style="color:var(--blue); text-align:left; margin-left:5px;">МОДЕРНИЗАЦИЯ</h3>
                <div id="upgrades-list"></div>
            </div>
        </div>

        <div class="navbar">
            <div class="nav-btn active" id="n-fact" onclick="nav('tab-factory', 'n-fact')">🏭 ЦЕХ</div>
            <div class="nav-btn" id="n-shop" onclick="nav('tab-shop', 'n-shop')">🛒 РЫНОК</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; 
        tg.expand();
        tg.enableClosingConfirmation();

        let balance = 100, power = 10, passive = 0, lvl = 1, indName = "";

        function startApp(name, icon) {
            indName = name;
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('industry-title').innerText = name;
            document.getElementById('main-visual').innerText = icon;
            updateUpgrades();
            updateUI();
            tg.HapticFeedback.notificationOccurred('success');
        }

        function nav(s, b) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            document.getElementById(b).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function work() {
            balance += power; 
            updateUI();
            tg.HapticFeedback.impactOccurred('heavy');
        }

        function updateUpgrades() {
            const list = document.getElementById('upgrades-list');
            const upgs = [
                {n: 'Новые инструменты', c: 250, p: 5, a: 0},
                {n: 'Автоматика v.1', c: 1200, p: 0, a: 8},
                {n: 'Робо-манипулятор', c: 6000, p: 25, a: 45}
            ];
            list.innerHTML = upgs.map(u => `
                <div class="upgrade-card">
                    <div style="text-align:left;">
                        <div class="upg-name">${u.n}</div>
                        <div style="color:#888; font-size:11px;">Цена: ${u.c} 🪙</div>
                    </div>
                    <button style="background:transparent; border:2px solid var(--blue); color:var(--blue); padding:10px 15px; border-radius:10px; font-weight:bold;" 
                    onclick="buy(${u.c}, ${u.p}, ${u.a})">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function buy(c, p, a) {
            if (balance >= c) {
                balance -= c; 
                power += p; 
                passive += a; 
                lvl++;
                updateUI(); 
                tg.HapticFeedback.notificationOccurred('success');
            } else { 
                tg.HapticFeedback.notificationOccurred('error');
                tg.showAlert("Средств недостаточно для этой модернизации!"); 
            }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('p-income').innerText = "+" + passive + " 🪙/сек";
            document.getElementById('lvl').innerText = lvl;
        }

        setInterval(() => { 
            if (passive > 0) { 
                balance += passive/10; 
                updateUI(); 
            } 
        }, 100);
    </script>
</body>
</html>
