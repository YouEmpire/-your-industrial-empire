<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Industrial Empire Gold</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00d2ff; --gold: #ffcc00; --bg: #08080a; --card: #121214; --neon: 0 0 15px var(--blue); }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        
        .header { background: rgba(15, 15, 17, 0.95); padding: 20px; text-align: center; border-bottom: 2px solid var(--blue); box-shadow: var(--neon); z-index: 100; position: relative; }
        .balance { font-size: 36px; font-weight: 900; color: var(--gold); text-shadow: 0 0 20px var(--gold); }
        
        /* ИГРОВАЯ СЦЕНА */
        #viewport { width: 100%; height: 55vh; position: relative; background: #111; overflow: hidden; perspective: 1000px; border-bottom: 1px solid #333; }
        .scene-bg { position: absolute; width: 200%; height: 200%; top: -50%; left: -50%; transform: rotateX(60deg) rotateZ(45deg); 
                    background-image: radial-gradient(#222 1px, transparent 1px); background-size: 30px 30px; opacity: 0.3; }
        
        /* ОБЪЕКТЫ */
        .building { position: absolute; transform-style: preserve-3d; transition: 0.5s; }
        
        /* АНИМАЦИИ ГРАФИКИ */
        (at)keyframes gearRotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        (at)keyframes tractorPath { 0% { left: -20%; bottom: 10%; } 50% { left: 110%; bottom: 15%; } 100% { left: -20%; bottom: 10%; } }
        (at)keyframes smoke { 0% { transform: translateY(0) scale(1); opacity: 0.5; } 100% { transform: translateY(-100px) scale(2); opacity: 0; } }

        .active-gear { animation: gearRotate 3s linear infinite; }
        .moving-unit { animation: tractorPath 15s linear infinite; }
        .smoke-particle { position: absolute; width: 10px; height: 10px; background: #555; border-radius: 50%; animation: smoke 2s infinite; }

        /* ИНТЕРФЕЙС УПРАВЛЕНИЯ */
        .ui-panel { height: 30vh; background: var(--bg); padding: 15px; overflow-y: auto; }
        .btn-action { background: linear-gradient(135deg, var(--blue), #0066ff); border: none; color: white; width: 100%; padding: 20px; border-radius: 20px; font-size: 24px; font-weight: 900; box-shadow: 0 6px #0044aa; text-transform: uppercase; cursor: pointer; }
        .btn-action:active { transform: translateY(4px); box-shadow: 0 2px #0044aa; }

        .nav { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 15px 0; border-top: 1px solid #333; }
        .nav-item { color: #555; font-size: 11px; font-weight: bold; cursor: pointer; text-align: center; }
        .nav-item.active { color: var(--blue); text-shadow: var(--neon); }

        .upgrade-card { background: var(--card); border-radius: 15px; padding: 15px; margin-bottom: 10px; border-left: 5px solid var(--blue); display: flex; justify-content: space-between; align-items: center; }
    </style>
</head>
<body>
    <div id="selector" style="padding: 40px 20px; text-align: center;">
        <h1 style="color: var(--blue); text-shadow: var(--neon);">ВЫБОР ОТРАСЛИ</h1>
        <div style="background: var(--card); padding: 20px; margin: 15px; border-radius: 20px; border: 1px solid #333;" onclick="init('farm')">🚜 АГРОКОМПЛЕКС</div>
        <div style="background: var(--card); padding: 20px; margin: 15px; border-radius: 20px; border: 1px solid #333;" onclick="init('service')">⚙️ ТЕХЦЕНТР</div>
        <div style="background: var(--card); padding: 20px; margin: 15px; border-radius: 20px; border: 1px solid #333;" onclick="init('mine')">⛏️ ДОБЫЧА</div>
    </div>

    <div id="app" style="display: none;">
        <div class="header">
            <div class="balance" id="money">100</div>
            <div style="color: #0f0; font-weight: bold; font-size: 14px;">+<span id="pps">0</span>/сек</div>
        </div>

        <div id="viewport">
            <div class="scene-bg"></div>
            <div id="objects-layer"></div>
        </div>

        <div class="ui-panel">
            <div id="main-tab">
                <button class="btn-action" onclick="clickWork()">ПРОИЗВОДСТВО</button>
            </div>
            <div id="shop-tab" style="display: none;">
                <div id="shop-items"></div>
            </div>
        </div>

        <div class="nav">
            <div class="nav-item active" onclick="showTab('main', this)">🏭 ЗАВОД</div>
            <div class="nav-item" onclick="showTab('shop', this)">🛒 РЫНОК</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let state = { money: 100, pps: 0, click: 10, type: '' };

        const layers = {
            farm: '<div class="building active-gear" style="top:20%; left:20%; font-size:100px;">🌾</div><div class="building moving-unit" style="font-size:50px;">🚜</div>',
            service: '<div class="building" style="top:30%; left:40%; font-size:120px;">🏢</div><div class="building active-gear" style="top:50%; left:45%; font-size:60px;">⚙️</div>',
            mine: '<div class="building" style="top:20%; right:10%; font-size:100px;">⛰️</div><div class="building active-gear" style="top:40%; right:15%; font-size:50px;">⛏️</div>'
        };

        function init(type) {
            state.type = type;
            document.getElementById('selector').style.display = 'none';
            document.getElementById('app').style.display = 'block';
            document.getElementById('objects-layer').innerHTML = layers[type];
            renderShop(); updateUI();
        }

        function clickWork() {
            state.money += state.click; updateUI();
            tg.HapticFeedback.impactOccurred('medium');
        }

        function showTab(tab, el) {
            document.getElementById('main-tab').style.display = tab === 'main' ? 'block' : 'none';
            document.getElementById('shop-tab').style.display = tab === 'shop' ? 'block' : 'none';
            document.querySelectorAll('.nav-item').forEach(i => i.classList.remove('active'));
            el.classList.add('active');
        }

        function renderShop() {
            const shop = document.getElementById('shop-items');
            const items = [{n: 'Модернизация', c: 500, p: 10}, {n: 'Автоматика', c: 2500, p: 60}, {n: 'Индустрия', c: 15000, p: 400}];
            shop.innerHTML = items.map(i => `
                <div class="upgrade-card">
                    <div><b>${i.n}</b><br><small>Цена: ${i.c}</small></div>
                    <button style="background:var(--blue); border:none; color:black; padding:10px; border-radius:10px; font-weight:bold;" onclick="buy(${i.c}, ${i.p})">КУПИТЬ</button>
                </div>
            `).join('');
        }

        function buy(c, p) {
            if(state.money >= c) {
                state.money -= c; state.pps += p; updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            } else { tg.showAlert("Мало средств!"); }
        }

        function updateUI() {
            document.getElementById('money').innerText = Math.floor(state.money);
            document.getElementById('pps').innerText = state.pps;
        }

        setInterval(() => { if(state.pps > 0) { state.money += state.pps/10; updateUI(); } }, 100);
    </script>
</body>
</html>
