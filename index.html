<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Your Industrial Empire</title>
    <script src="https://telegram.org/js/telegram-web-app.js"></script>
    <style>
        :root { --blue: #00d2ff; --gold: #ffcc00; --bg: #050505; --card: #121214; }
        body { font-family: 'Segoe UI', sans-serif; background: var(--bg); color: white; margin: 0; padding: 0; user-select: none; overflow: hidden; }
        
        .header { background: rgba(15, 15, 17, 0.9); padding: 15px; text-align: center; border-bottom: 2px solid var(--blue); position: sticky; top: 0; z-index: 100; backdrop-filter: blur(10px); }
        .balance { font-size: 34px; font-weight: 900; color: var(--gold); text-shadow: 0 0 15px var(--gold); }
        
        /* ИГРОВОЙ МИР */
        #game-world { width: 100%; height: 50vh; position: relative; overflow: hidden; background: radial-gradient(circle at center, #1a1a1e, #050505); border-bottom: 1px solid #333; }
        .object { position: absolute; transition: 0.5s; }

        /* АНИМАЦИИ ОТРАСЛЕЙ */
        (at)keyframes rotate { from { transform: rotate(0deg); } to { transform: rotate(360deg); } }
        (at)keyframes drive { 0% { left: -60px; } 100% { left: 110%; } }
        (at)keyframes liftUp { 0% { transform: translateY(0); } 100% { transform: translateY(-30px); } }
        (at)keyframes spark { 0% { opacity: 0; } 50% { opacity: 1; } 100% { opacity: 0; } }
        (at)keyframes shake { 0% { transform: translate(1px, 1px); } 100% { transform: translate(-1px, -1px); } }

        .windmill { font-size: 80px; top: 20%; left: 10%; animation: rotate 10s linear infinite; }
        .tractor { font-size: 40px; bottom: 20%; left: -50px; animation: drive 8s linear infinite; }
        .lift { font-size: 60px; bottom: 30%; left: 40%; animation: liftUp 3s infinite alternate; }
        .sparks { font-size: 20px; bottom: 35%; left: 45%; opacity: 0; animation: spark 0.5s infinite; }
        .cart { font-size: 50px; bottom: 10%; left: -60px; animation: drive 6s linear infinite; }
        .drill { font-size: 70px; top: 30%; right: 10%; animation: shake 0.2s infinite; }

        .main-container { height: 35vh; overflow-y: auto; padding: 15px; background: var(--bg); }
        .screen { display: none; }
        .screen.active { display: block; }

        /* ИНТЕРФЕЙС */
        .choice-card { background: var(--card); border-radius: 15px; padding: 20px; margin-bottom: 10px; border: 1px solid #333; text-align: center; cursor: pointer; }
        .btn-main { background: linear-gradient(135deg, var(--blue), #0066ff); border: none; color: white; width: 100%; padding: 18px; border-radius: 15px; font-size: 20px; font-weight: 900; box-shadow: 0 4px #0044aa; text-transform: uppercase; }
        .btn-main:active { transform: translateY(2px); box-shadow: 0 2px #0044aa; }

        .upgrade-card { background: var(--card); border-radius: 12px; padding: 12px; margin-bottom: 8px; display: flex; justify-content: space-between; align-items: center; border-left: 4px solid var(--blue); }
        .navbar { position: fixed; bottom: 0; width: 100%; background: #111; display: flex; justify-content: space-around; padding: 10px 0; border-top: 1px solid #333; }
        .nav-btn { color: #555; text-align: center; flex: 1; font-size: 10px; font-weight: bold; cursor: pointer; }
        .nav-btn.active { color: var(--blue); }
    </style>
</head>
<body>
    <div id="setup-screen" class="screen active" style="padding: 20px; text-align: center;">
        <h2 style="color: var(--blue);">ГЕНЕРАЛЬНЫЙ ПЛАН</h2>
        <div class="choice-card" onclick="initGame('farm')">🌾 ФЕРМА</div>
        <div class="choice-card" onclick="initGame('auto')">🔧 ШИНОМОНТАЖ</div>
        <div class="choice-card" onclick="initGame('mine')">💎 ШАХТА</div>
    </div>

    <div id="game-ui" style="display: none;">
        <div class="header">
            <div class="balance" id="balance">100</div>
            <div style="color: #00ff00; font-size: 12px; font-weight: bold;">ДОХОД: <span id="p-income">0</span> 🪙/сек</div>
        </div>
        <div id="game-world"></div>
        <div class="main-container">
            <div id="tab-work" class="screen active">
                <button class="btn-main" onclick="work()">ПРОИЗВЕСТИ</button>
            </div>
            <div id="tab-shop" class="screen">
                <div id="upgrades-list"></div>
            </div>
        </div>
        <div class="navbar">
            <div class="nav-btn active" id="n-work" onclick="nav('tab-work', 'n-work')">🏭 ОБЪЕКТ</div>
            <div class="nav-btn" id="n-shop" onclick="nav('tab-shop', 'n-shop')">🛒 РЫНОК</div>
        </div>
    </div>

    <script>
        let tg = window.Telegram.WebApp; tg.expand();
        let balance = 100, power = 10, passive = 0, currentType = "";

        const worldContent = {
            farm: '<div class="object windmill">⚙️</div><div class="object tractor">🚜</div><div style="position:absolute; bottom:0; width:100%; height:40px; background:#2d5a27;"></div>',
            auto: '<div class="object lift">🚗</div><div class="object sparks">✨</div><div style="position:absolute; bottom:0; width:100%; height:40px; background:#333;"></div>',
            mine: '<div class="object drill">⚙️</div><div class="object cart">🛒</div><div style="position:absolute; bottom:0; width:100%; height:40px; background:#1a110a;"></div>'
        };

        function initGame(type) {
            currentType = type;
            document.getElementById('setup-screen').classList.remove('active');
            document.getElementById('game-ui').style.display = 'block';
            document.getElementById('game-world').innerHTML = worldContent[type];
            updateShop(); updateUI();
        }

        function nav(s, b) {
            document.querySelectorAll('.screen').forEach(x => x.classList.remove('active'));
            document.querySelectorAll('.nav-btn').forEach(x => x.classList.remove('active'));
            document.getElementById(s).classList.add('active');
            document.getElementById(b).classList.add('active');
            tg.HapticFeedback.impactOccurred('light');
        }

        function work() { balance += power; updateUI(); tg.HapticFeedback.impactOccurred('heavy'); }

        function updateShop() {
            const list = document.getElementById('upgrades-list');
            const upgs = [
                {n: 'Автоматизация v1', c: 500, p: 10},
                {n: 'Новое оборудование', c: 2000, p: 50},
                {n: 'Индустриальный узел', c: 10000, p: 300}
            ];
            list.innerHTML = upgs.map(u => `
                <div class="upgrade-card">
                    <div><b>${u.n}</b><br><small>+${u.p} 🪙/сек</small></div>
                    <button style="background:transparent; border:1px solid var(--blue); color:var(--blue); padding:8px; border-radius:8px;" onclick="buy(${u.c}, ${u.p})">${u.c} 🪙</button>
                </div>
            `).join('');
        }

        function buy(c, p) {
            if (balance >= c) {
                balance -= c; passive += p; updateUI();
                tg.HapticFeedback.notificationOccurred('success');
            } else { tg.showAlert("Недостаточно монет!"); }
        }

        function updateUI() {
            document.getElementById('balance').innerText = Math.floor(balance);
            document.getElementById('p-income').innerText = passive;
        }

        setInterval(() => { if (passive > 0) { balance += passive/10; updateUI(); } }, 100);
    </script>
</body>
</html>
